# Déploiement Netlify — app Vite multi-pages avec slugs publics propres.
# Les fichiers HTML restent uniquement des entrées de build internes.

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/connexion"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/bienvenue"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/super-admin"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/super-admin/*"
  to = "/app.html"
  status = 200
