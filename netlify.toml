# Déploiement Netlify — app Vite multi-pages.
# Toutes les routes /app/* sont servies par le shell React unifié (app.html).
# /tohu-app.html reste un fichier statique servi tel quel : c'est le redirecteur
# legacy (anciens favoris + redirectTo OAuth whitelistés chez Supabase).

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/app/*"
  to = "/app.html"
  status = 200
